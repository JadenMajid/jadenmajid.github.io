<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - Jaden Blog</title>
    <link rel="icon" type="image/png" href="{{ '/images/icon.png' | relative_url }}">
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">

    {% if page.math %}
    <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true,
        processEnvironments: true
      },
      options: {
        skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
      }
    };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    {% endif %}
</head>

<body class="blog-page">
    <div class="blog-shell">
        <header class="retro-topbar">
            <div class="retro-topbar-title">blog/posts/{{ page.title }}.html</div>
            <a class="retro-close-btn" href="{{ '/blog/blogposts.html' | relative_url }}" aria-label="Return to blog posts">X</a>
        </header>

        <main class="blog-main blog-post-main">
            <div class="blog-post-actions">
                <a class="os-btn" href="{{ '/blog/blogposts.html' | relative_url }}">Back to Blog Posts</a>
                {% if page.repo and page.repo != "" %}
                <a class="os-btn repo-btn" href="{{ page.repo }}" target="_blank">Source Code</a>
                {% endif %}
            </div>
            
            {% if page.thumbnail %}
            <img src="{{ page.thumbnail | relative_url }}" alt="{{ page.title }}" class="blog-thumbnail-large">
            {% endif %}

            <div class="blog-post-header">
                <h1 class="pixel-text large">{{ page.title }}</h1>
            </div>
            <p class="blog-post-date">{{ page.date | date: "%b %-d, %Y" }}</p>
            <article class="blog-post-content">
                {{ content }}
            </article>
        </main>
    </div>
</body>

</html>
