<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Jaden Majid</title>
    <link rel="icon" type="image/png" href="../images/icon128.png">
    <link rel="stylesheet" href="../styles.css">
</head>

<body class="blog-page">
    <div class="blog-shell">
        <header class="retro-topbar">
            <div class="retro-topbar-title">blog/blogposts.html</div>
            <a class="retro-close-btn" href="/index.html" aria-label="Return to desktop">X</a>
        </header>

        <main class="blog-main">
            <h1 class="pixel-text large">BLOG MOVED</h1>
            <p class="highlight-bg">New posts now live on Substack.</p>

            <section class="blog-post-list" id="blog-post-list">
                <article class="blog-post-card">
                    <h2 class="pixel-text mid">Follow on Substack</h2>
                    <p class="blog-post-date">Updated Apr 10, 2026</p>
                    <p>I migrated the blog from this Jekyll setup to Substack. Use the button below to read the latest posts.</p>
                    <div class="field-row">
                        <a class="os-btn" href="https://jadenmajid.substack.com/" target="_blank" rel="noopener noreferrer">Open Substack</a>
                        <a class="os-btn" href="/index.html">Return to Desktop</a>
                    </div>
                </article>
            </section>
        </main>
    </div>
</body>

</html>
