name: Jekyll Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Jekyll dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f Gemfile ]]; then
            gem install bundler
            bundle install --jobs 4 --retry 3
          else
            gem install jekyll bundler
          fi

      - name: Build site
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./buildblog.sh
          ./buildblog.sh

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: jekyll-site
          path: _site
          if-no-files-found: error
